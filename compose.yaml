services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/var/www/html
      - vendor_data:/var/www/html/vendor
      - var_data:/var/www/html/var
    depends_on:
      db:
        condition: service_healthy
    networks:
      - connectPerso

  nginx:
    image: nginx:stable
    ports:
      - "8085:80"
    volumes:
      - .:/var/www/html
      - vendor_data:/var/www/html/vendor
      - var_data:/var/www/html/var
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - connectPerso

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: test
      MYSQL_USER: app
      MYSQL_PASSWORD: app
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - connectPerso
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"]
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    ports:
      - "8082:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root
    depends_on:
      - db
    networks:
      - connectPerso

networks:
  connectPerso:
    driver: bridge

volumes:
  mysql_data:
  vendor_data:
  var_data:
